name: auction

services:
  auction:
    image: ${AUCTION_IMAGE:-ghcr.io/lukasa1993/car-auction-homelab:latest}
    container_name: auction
    pull_policy: always
    restart: unless-stopped
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    ports:
      - "127.0.0.1:3005:3005"
    env_file:
      - ${AUCTION_RUNTIME_DIR:-/Users/l/_APPS/auction}/.env
    volumes:
      - ${AUCTION_RUNTIME_DIR:-/Users/l/_APPS/auction}/data:/app/data
      - ${AUCTION_RUNTIME_DIR:-/Users/l/_APPS/auction}/runner-keys:/app/runner-keys:ro
